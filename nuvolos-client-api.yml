    post:
      description: Creates a derived image from an existing Nuvolos application
      operationId: derive_app
      parameters:
        - in: path
          name: org_slug
          required: true
          schema:
            type: string
        - in: path
          name: space_slug
          required: true
          schema:
            type: string
        - in: path
          name: instance_slug
          required: true
          schema:
            type: string
        - in: path
          name: app_slug
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeriveApp"
      responses:
        "202":
          description: Request accepted
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Bad request
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ClientApiError"
        "401":
          description: Unauthorized
        "403":
          description: Access to Nuvolos resource is forbidden
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ClientApiError"
        "404":
          description: Nuvolos object not found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ClientApiError"
        "409":
          description: Conflict with Nuvolos object
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ClientApiError"
        "410":
          description: Nuvolos object no longer available
          content:
            "*/*":
