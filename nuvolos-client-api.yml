  "/images/v1/{imid}":
    patch:
      description: "Updates fields of an existing image record accessible to the
        authenticated user. All fields are optional; only provided fields are
        updated. release_date is always set to the current date on a successful
        update. Updatable fields: name, description, docker_image_url,
        configuration, app_type, description_md, complexity, tags, public,
        public_description."
      operationId: update_image
      parameters:
        - in: path
          name: imid
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageUpdate"
      responses:
        "200":
          description: Image updated
